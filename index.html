<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubbles Library</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/themify-icons.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #106B6B; overflow: hidden; }
        #flipbookContainer { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="flipbookContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.0/js/dflip.min.js"></script>

    <script>
        jQuery(document).ready(function () {
            // 1. Get the book name from the URL (e.g., ?book=The-Room)
            const urlParams = new URLSearchParams(window.location.search);
            const bookName = urlParams.get('book') || 'The-Room'; // Default to The-Room if none specified

            // 2. Path to your PDF folder
            var pdfUrl = "books/" + bookName + ".pdf";
            console.log("Attempting to load PDF from: " + pdfUrl);

            var options = {
                direction: 2, 
                height: '100%',
                duration: 700,
                backgroundColor: "#EDF6F7" // Using your light mint color for the inner pages
            };

            $("#flipbookContainer").flipBook(pdfUrl, options);
        });
    </script>
</body>
</html>
