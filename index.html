<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Room - Bubbles in Arabic</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/themify-icons.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #106B6B; }
        #flipbookContainer { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="flipbookContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.0/js/dflip.min.js"></script>

    <script>
        jQuery(document).ready(function () {
            // Direct link to your PDF on GitHub
            var pdfUrl = "https://raw.githubusercontent.com/bubblesinarabic/flipped-book-the-room/main/The-Room.pdf";

          var options = {
    direction: 2,
    startPage: 7, 
    height: '100%',
    backgroundColor: "#106B6B"
    
};

            // Initialize the flipbook
            $("#flipbookContainer").flipBook(pdfUrl, options);
        });
    </script>

</body>
</html>
