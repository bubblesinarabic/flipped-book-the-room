<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Room - Bubbles in Arabic</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/themify-icons.min.css">
    
    <style>
        body { margin: 0; background-color: #f4f4f4; }
        #container { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="flipbookContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.0/js/dflip.min.js"></script>

    <script>
        jQuery(document).ready(function () {
            // Path to your PDF hosted on GitHub
            var pdfUrl = "https://raw.githubusercontent.com/bubblesinarabic/flipped-book-the-room/main/The-Room.pdf";

            var options = {
                direction: DFLIP.DIRECTION.RTL, // ARABIC: Right to Left
                height: 800,
                duration: 800,
                backgroundColor: "#f4f4f4"
            };

            var flipBook = $("#flipbookContainer").flipBook(pdfUrl, options);
        });
    </script>

</body>
</html>
