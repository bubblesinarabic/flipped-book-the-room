<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubbles Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.0/css/themify-icons.min.css">
    
    <style>
        /* Base styles with Almarai font */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #106B6B; overflow: hidden; 
            font-family: 'Almarai', sans-serif; 
        }
        
        #flipbookContainer { width: 100%; height: 100vh; }

        /* ENHANCED FLOATING MENU */
        .library-menu {
            position: fixed; 
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999999 !important; 
            background: rgba(237, 246, 247, 0.98); /* Light Mint Background */
            padding: 15px 35px;
            border-radius: 25px;
            border: 3px solid #106B6B; /* Teal Border */
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .library-menu h3 {
            margin: 0;
            color: #106B6B; /* Teal Color */
            font-size: 22px; /* Bigger Title */
            padding-left: 20px;
            border-left: 3px solid #106B6B;
            font-weight: 700;
        }

        .thumb-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #106B6B; /* Teal Color */
            font-weight: 700;
            font-size: 16px; /* Bigger Text */
            transition: all 0.3s ease;
        }

        .thumb-btn:hover {
            transform: translateY(-5px) scale(1.05);
            color: #0d5252; /* Darker teal on hover */
        }

        /* BIGGER THUMBNAILS */
        .thumb-btn img {
            width: 80px;  /* Increased from 50px */
            height: 110px; /* Increased from 70px */
            object-fit: cover;
            border: 2px solid #106B6B;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 8px;
            background-color: #ccc;
        }

        /* Responsive tweak for mobile */
        @media (max-width: 600px) {
            .library-menu { padding: 10px 20px; gap: 15px; width: 90%; justify-content: center; }
            .library-menu h3 { font-size: 16px; padding-left: 10px; }
            .thumb-btn img { width: 50px; height: 70px; }
            .thumb-btn span { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="library-menu">
        <h3>📚 مكتبتي</h3>
        
        <a href="?book=The-Room" class="thumb-btn">
            <img src="./covers/The-Room.jpg" alt="The Room" onerror="this.src='https://via.placeholder.com/80x110?text=Cover'"> 
            <span>الغرفة</span>
        </a>

        <a href="?book=Recess" class="thumb-btn">
            <img src="./covers/Recess.jpg" alt="Recess" onerror="this.src='https://via.placeholder.com/80x110?text=Cover'">
            <span>الفسحة</span>
        </a>
    </div>

    <div id="flipbookContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.0/js/dflip.min.js"></script>

    <script>
        jQuery(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const bookName = urlParams.get('book') || 'The-Room'; 

            var pdfUrl = "./books/" + bookName + ".pdf";

            var options = {
                direction: 2,               
                height: '100%',
                duration: 700,
                backgroundColor: "#EDF6F7" 
            };

            $("#flipbookContainer").flipBook(pdfUrl, options);
        });
    </script>
</body>
</html>
